<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Notificação Timer</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#0f1117;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:400px;
        background:#181c25;
        border:1px solid #2b3140;
        border-radius:20px;
        padding:25px;
        box-shadow:0 0 30px rgba(0,0,0,.4);
    }

    h1{
        font-size:28px;
        margin-bottom:10px;
    }

    p{
        color:#a8b0c0;
        margin-bottom:25px;
    }

    .input-group{
        margin-bottom:20px;
    }

    label{
        display:block;
        margin-bottom:8px;
        font-size:14px;
        color:#d7dbe5;
    }

    input{
        width:100%;
        padding:15px;
        border:none;
        border-radius:12px;
        background:#232938;
        color:white;
        font-size:16px;
        outline:none;
    }

    button{
        width:100%;
        padding:15px;
        border:none;
        border-radius:14px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:.3s;
        margin-top:10px;
    }

    .permitir{
        background:#4f7cff;
        color:white;
    }

    .permitir:hover{
        transform:scale(1.02);
    }

    .comecar{
        background:#00c27a;
        color:white;
    }

    .comecar:hover{
        transform:scale(1.02);
    }

    .status{
        margin-top:20px;
        padding:14px;
        border-radius:12px;
        background:#232938;
        color:#cfd6e6;
        text-align:center;
        font-size:14px;
    }
</style>
</head>
<body>

<div class="container">

    <h1>Notificação Timer</h1>

    <p>
        Escolha o tempo e envie uma notificação automática.
    </p>

    <button class="permitir" onclick="pedirPermissao()">
        Permitir Notificações
    </button>

    <div class="input-group">
        <label>Tempo em segundos</label>
        <input type="number" id="tempo" placeholder="Ex: 5">
    </div>

    <button class="comecar" onclick="comecarTimer()">
        Começar
    </button>

    <div class="status" id="status">
        Aguardando...
    </div>

</div>

<script>

function pedirPermissao(){

    Notification.requestPermission().then(permission => {

        if(permission === "granted"){
            status.innerHTML = "✅ Permissão concedida!";
        }else{
            status.innerHTML = "❌ Permissão negada!";
        }

    });

}

function comecarTimer(){

    let segundos = document.getElementById("tempo").value;

    if(segundos === ""){
        alert("Digite um tempo.");
        return;
    }

    if(Notification.permission !== "granted"){
        alert("Permita as notificações primeiro.");
        return;
    }

    status.innerHTML = `⏳ Esperando ${segundos} segundos...`;

    setTimeout(() => {

        new Notification("Oi, tudo bem?",{
            body:"Essa é sua notificação automática 😄",
            icon:"https://cdn-icons-png.flaticon.com/512/1827/1827370.png"
        });

        status.innerHTML = "✅ Notificação enviada!";

    }, segundos * 1000);

}

</script>

</body>
</html>
